<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Up</title>
    
    <link rel="apple-touch-icon" href="budget.png">
    <link rel="icon" type="image/png" href="budget.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Budget Up">

    <style>
        :root { 
            --primary: #222; 
            --accent: #f39c12; /* Gold accent for the $ look */
            --dark: #000; 
            --bg: #1a1a1a; 
            --card-bg: #2a2a2a;
            --text: #eee;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Glassmorphism Header */
        header { 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(145deg, #333, #000);
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding-bottom: 10px; scrollbar-width: none; }
        .tab-btn { 
            padding: 8px 15px; border: 1px solid #444; background: #333; 
            color: #aaa; cursor: pointer; border-radius: 20px; white-space: nowrap; 
        }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; border-color: var(--accent); }

        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        input { 
            background: #111; border: 1px solid #444; color: white; padding: 10px; 
            border-radius: 6px; width: calc(100% - 22px); margin-top: 5px; font-size: 16px; 
        }
        input:focus { border-color: var(--accent); outline: none; }

        .purchase-row { display: grid; grid-template-columns: 1fr 80px 40px; gap: 8px; margin-top: 10px; align-items: center; }
        .btn-add { background: transparent; color: var(--accent); border: 1px dashed var(--accent); padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        
        .total-box { font-size: 0.9em; color: var(--accent); margin-top: 12px; text-align: right; border-top: 1px solid #444; padding-top: 5px; }
        
        .footer-summary { 
            position: sticky; bottom: 10px; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; 
            border: 1px solid var(--accent); margin-top: 30px;
        }
        
        .security-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.7em; }
        .security-bar button { background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="margin:0; letter-spacing: 2px;">BUDGET UP</h1>
    </header>

    <div class="security-bar">
        <span>● LOCAL STORAGE ACTIVE</span>
        <div>
            <button onclick="exportData()">EXPORT</button>
            <button onclick="importData()">IMPORT</button>
        </div>
    </div>

    <div class="tabs" id="monthTabs"></div>

    <div id="appBody">
        <div class="grid">
            <section class="card">
                <h3 style="margin-top:0">Income</h3>
                <input type="number" id="pc1" oninput="updateCalculations()" placeholder="Paycheck 1">
                <input type="number" id="pc2" oninput="updateCalculations()" placeholder="Paycheck 2">
                <input type="number" id="otherInc" oninput="updateCalculations()" placeholder="Other Income">
                <div class="total-box">Total: $<span id="totalIncome">0.00</span></div>
            </section>

            <section class="card">
                <h3 style="margin-top:0">Savings</h3>
                <input type="number" id="savings" oninput="updateCalculations()" placeholder="Cumulative Savings">
                <p style="font-size: 0.7em; color: #777; margin-top: 25px;">*Tracked separately from balance.</p>
            </section>
        </div>

        <div id="expenseSections"></div>

        <div class="footer-summary">
            <div style="display:grid; grid-template-columns: 1fr 1fr;">
                <div style="font-size: 0.8em; line-height: 1.6;">
                    INCOME: $<span id="sumInc">0.00</span><br>
                    OUTGOING: $<span id="sumOut">0.00</span><br>
                    SAVINGS: $<span id="sumSav">0.00</span>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 0.7em; color: var(--accent);">REMAINING BALANCE</span>
                    <h2 style="margin: 0; color: white;">$<span id="sumBal">0.00</span></h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentMonth = new Date().getMonth();
    const categories = ['Recurring', 'Household', 'Vehicle', 'Phone', 'Health & Beauty', 'Other'];
    const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
    let db = JSON.parse(localStorage.getItem('budgetUpData')) || {};

    function init() {
        renderTabs();
        loadMonth(currentMonth);
    }

    function renderTabs() {
        document.getElementById('monthTabs').innerHTML = months.map((m, i) => 
            `<button class="tab-btn ${i === currentMonth ? 'active' : ''}" onclick="loadMonth(${i})">${m}</button>`
        ).join('');
    }

    function loadMonth(idx) {
        currentMonth = idx;
        renderTabs();
        if(!db[idx]) db[idx] = { pc1:0, pc2:0, otherInc:0, savings:0, expenses: {} };
        categories.forEach(cat => { if(!db[idx].expenses[cat]) db[idx].expenses[cat] = []; });

        document.getElementById('pc1').value = db[idx].pc1 || '';
        document.getElementById('pc2').value = db[idx].pc2 || '';
        document.getElementById('otherInc').value = db[idx].otherInc || '';
        document.getElementById('savings').value = db[idx].savings || '';

        renderExpenses();
        updateCalculations();
    }

    function renderExpenses() {
        document.getElementById('expenseSections').innerHTML = categories.map(cat => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <h3 style="margin:0; font-size: 1rem;">${cat}</h3>
                </div>
                <div id="list-${cat}">
                    ${db[currentMonth].expenses[cat].map((exp, i) => `
                        <div class="purchase-row">
                            <input type="text" value="${exp.name}" onchange="editExp('${cat}', ${i}, 'name', this.value)" placeholder="Item">
                            <input type="number" value="${exp.amt}" onchange="editExp('${cat}', ${i}, 'amt', this.value)" placeholder="0.00">
                            <button onclick="deleteExp('${cat}', ${i})" style="background:none; border:none; color:#ff4444; cursor:pointer">✕</button>
                        </div>
                    `).join('')}
                </div>
                <button class="btn-add" onclick="addPurchase('${cat}')">+ ADD TO ${cat.toUpperCase()}</button>
                <div class="total-box">Total: $<span id="total-${cat}">0.00</span></div>
            </div>
        `).join('');
    }

    function updateCalculations() {
        const m = db[currentMonth];
        m.pc1 = parseFloat(document.getElementById('pc1').value) || 0;
        m.pc2 = parseFloat(document.getElementById('pc2').value) || 0;
        m.otherInc = parseFloat(document.getElementById('otherInc').value) || 0;
        const totalInc = m.pc1 + m.pc2 + m.otherInc;
        document.getElementById('totalIncome').innerText = totalInc.toFixed(2);
        m.savings = parseFloat(document.getElementById('savings').value) || 0;

        let totalOut = 0;
        categories.forEach(cat => {
            const sectionTotal = m.expenses[cat].reduce((sum, item) => sum + (parseFloat(item.amt) || 0), 0);
            document.getElementById(`total-${cat}`).innerText = sectionTotal.toFixed(2);
            totalOut += sectionTotal;
        });

        document.getElementById('sumInc').innerText = totalInc.toFixed(2);
        document.getElementById('sumOut').innerText = totalOut.toFixed(2);
        document.getElementById('sumSav').innerText = m.savings.toFixed(2);
        document.getElementById('sumBal').innerText = (totalInc - totalOut).toFixed(2);
        saveToLocal();
    }

    function addPurchase(cat) {
        db[currentMonth].expenses[cat].push({name: '', amt: ''});
        renderExpenses();
    }

    function editExp(cat, i, field, val) {
        db[currentMonth].expenses[cat][i][field] = val;
        updateCalculations();
    }

    function deleteExp(cat, i) {
        db[currentMonth].expenses[cat].splice(i, 1);
        renderExpenses();
        updateCalculations();
    }

    function saveToLocal() { localStorage.setItem('budgetUpData', JSON.stringify(db)); }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const a = document.createElement('a');
        a.href = dataStr; a.download = "budget_backup.json"; a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { db = JSON.parse(ev.target.result); loadMonth(currentMonth); };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    init();
</script>
</body>
</html>
