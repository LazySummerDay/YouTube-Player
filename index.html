    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            console.log("YouTube API Ready");
        }

        function loadVideo() {
            const url = document.getElementById('yt-url').value;
            const videoId = extractId(url);
            
            if (videoId) {
                if (player && player.loadVideoById) {
                    player.loadVideoById(videoId);
                } else {
                    player = new YT.Player('player', {
                        height: '100%',
                        width: '100%',
                        videoId: videoId,
                        playerVars: { 'playsinline': 1, 'controls': 1, 'autoplay': 1 },
                        events: { 'onStateChange': onPlayerStateChange }
                    });
                }
            } else {
                alert("Could not find a Video ID. Make sure it's a valid YouTube link!");
            }
        }

        function extractId(url) {
            // Updated regex to catch /live/, /shorts/, and standard v= IDs
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=)|(\&v=)|(live\/)|(shorts\/))([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[10].length == 11) ? match[10] : null;
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'Now Playing',
                        artist: 'StreamPipe',
                        artwork: [{ src: 'icon.png.jpeg', sizes: '512x512', type: 'image/jpeg' }]
                    });
                }
            }
        }

        function goFullscreen() {
            const container = document.getElementById('video-container');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }
    </script>
